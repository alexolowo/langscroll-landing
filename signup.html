<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Langscroll</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --grad: linear-gradient(135deg, #4550EB, #A855F7);
      --purple-500: #A855F7;
      --white: #ffffff;
    }

    html, body {
      height: 100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #080d24; overflow: hidden;
    }

    .globe-frame {
      position: fixed; inset: 0; width: 100%; height: 100%;
      border: none; pointer-events: none; z-index: 0;
    }

    .overlay {
      position: fixed; inset: 0; z-index: 1;
      background: linear-gradient(to bottom, rgba(8,13,36,0.6) 0%, rgba(26,10,64,0.5) 100%);
    }

    .page {
      position: relative; z-index: 2;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }

    .back {
      position: fixed; top: 20px; left: 24px; z-index: 10;
      display: flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.6); text-decoration: none;
      font-size: 14px; font-weight: 500; transition: color 0.2s;
    }
    .back:hover { color: rgba(255,255,255,0.9); }
    .back svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 32px;
      text-decoration: none;
    }
    .logo img { width: 32px; height: 32px; object-fit: contain; }
    .logo-text {
      font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card {
      width: 100%; max-width: 420px;
      background: rgba(12, 18, 45, 0.85);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 36px 32px;
    }

    .card-title {
      font-size: 20px; font-weight: 800; color: var(--white);
      margin-bottom: 6px;
    }
    .card-subtitle {
      font-size: 14px; color: rgba(255,255,255,0.45);
      margin-bottom: 28px; line-height: 1.5;
    }

    .btn-google {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 12px; border-radius: 10px; cursor: pointer;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      color: var(--white); font-size: 15px; font-weight: 600;
      font-family: inherit; transition: background 0.2s;
    }
    .btn-google:hover { background: rgba(255,255,255,0.13); }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

    .divider {
      display: flex; align-items: center; gap: 12px; margin: 20px 0;
    }
    .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
    .divider-text { font-size: 12px; color: rgba(255,255,255,0.3); font-weight: 500; }

    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,0.6); margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--white); font-size: 15px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .field input::placeholder { color: rgba(255,255,255,0.25); }
    .field input:focus { border-color: rgba(69,80,235,0.6); }

    .btn-primary {
      width: 100%; padding: 13px; border-radius: 10px; cursor: pointer;
      background: var(--grad); color: var(--white);
      font-size: 15px; font-weight: 700; font-family: inherit;
      border: none; margin-top: 6px; transition: filter 0.2s;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; filter: none; }

    .error-msg {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5; font-size: 13px; font-weight: 500;
      padding: 10px 14px; border-radius: 8px; margin-bottom: 16px;
      display: none;
    }
    .error-msg.show { display: block; }

    /* Success state */
    .success-card {
      width: 100%; max-width: 420px; text-align: center;
      background: rgba(12, 18, 45, 0.85);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 48px 32px;
      display: none;
    }
    .success-card.show { display: block; }
    .success-icon {
      width: 64px; height: 64px; margin: 0 auto 20px;
      background: var(--grad); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .success-icon svg { width: 30px; height: 30px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .success-card h2 { font-size: 22px; font-weight: 800; color: var(--white); margin-bottom: 10px; }
    .success-card p { font-size: 15px; color: rgba(255,255,255,0.55); line-height: 1.6; }
    .success-card .back-link {
      display: inline-block; margin-top: 28px;
      color: rgba(168,85,247,0.9); font-size: 14px; font-weight: 600;
      text-decoration: none;
    }
    .success-card .back-link:hover { color: var(--purple-500); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }

    @media (max-width: 480px) {
      .card, .success-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<iframe class="globe-frame" src="globe.html" title="Globe"></iframe>
<div class="overlay"></div>

<a href="index.html" class="back">
  <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  Back
</a>

<div class="page">
  <a href="index.html" class="logo">
    <img src="logo.png" alt="Langscroll">
    <span class="logo-text">langscroll</span>
  </a>

  <div class="card" id="auth-card">
    <div class="card-title">Create your account</div>
    <div class="card-subtitle">Join the pilot — first 100–200 users get free access for life.</div>

    <div class="error-msg" id="error-msg"></div>

    <button class="btn-google" id="btn-google" onclick="handleGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">OR</span>
      <div class="divider-line"></div>
    </div>

    <form onsubmit="handleSignup(event)">
      <div class="field">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="signup-confirm" placeholder="Repeat your password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn-primary" id="btn-signup">Create Account</button>
    </form>
  </div>

  <div class="success-card" id="success-card">
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </div>
    <h2 id="success-title">Check your inbox!</h2>
    <p id="success-message">We've sent a confirmation link to your email. Click it to activate your account and get early access to Langscroll.</p>
    <a href="index.html" class="back-link">← Back to home</a>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://rvfkbodbhietyljndfwx.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_8DV9d8TXrOLmwc_7qoB-Zw_qPRbjTDs';
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  client.auth.onAuthStateChange((event, session) => {
    if (session && (event === 'SIGNED_IN' || event === 'INITIAL_SESSION')) {
      showSuccess(
        "You're in! 🎉",
        `You're signed in as ${session.user.email}. Welcome to Langscroll — we'll be in touch soon!`
      );
    }
  });

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
  }

  function clearError() {
    document.getElementById('error-msg').classList.remove('show');
  }

  function showSuccess(title, message) {
    document.getElementById('auth-card').style.display = 'none';
    document.getElementById('success-title').textContent = title;
    document.getElementById('success-message').textContent = message;
    document.getElementById('success-card').classList.add('show');
  }

  function setLoading(loading) {
    const btn = document.getElementById('btn-signup');
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span> Please wait…' : 'Create Account';
  }

  async function handleGoogle() {
    clearError();
    document.getElementById('btn-google').disabled = true;
    const { error } = await client.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href }
    });
    if (error) {
      showError(error.message);
      document.getElementById('btn-google').disabled = false;
    }
  }

  async function handleSignup(e) {
    e.preventDefault();
    clearError();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const confirm = document.getElementById('signup-confirm').value;

    if (password !== confirm) { showError('Passwords do not match.'); return; }
    if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }

    setLoading(true);
    const { data, error } = await client.auth.signUp({
      email, password,
      options: { emailRedirectTo: window.location.href }
    });
    setLoading(false);

    if (error) {
      showError(error.message);
    } else if (data.user?.identities?.length === 0) {
      showError('An account with this email already exists.');
    } else {
      showSuccess(
        'Check your inbox!',
        `We've sent a confirmation link to ${email}. Click it to activate your account and get early access to Langscroll.`
      );
    }
  }
</script>
</body>
</html>
