<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Langscroll</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --grad: linear-gradient(135deg, #4550EB, #A855F7);
      --purple-500: #A855F7;
      --white: #ffffff;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #080d24;
      overflow: hidden;
    }

    .globe-frame {
      position: fixed; inset: 0; width: 100%; height: 100%;
      border: none; pointer-events: none; z-index: 0;
    }

    .overlay {
      position: fixed; inset: 0; z-index: 1;
      background: linear-gradient(to bottom, rgba(8,13,36,0.6) 0%, rgba(26,10,64,0.5) 100%);
    }

    .page {
      position: relative; z-index: 2;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }

    .back {
      position: fixed; top: 20px; left: 24px; z-index: 10;
      display: flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.6); text-decoration: none;
      font-size: 14px; font-weight: 500; transition: color 0.2s;
    }
    .back:hover { color: rgba(255,255,255,0.9); }
    .back svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 32px;
      text-decoration: none;
    }
    .logo img { width: 32px; height: 32px; object-fit: contain; }
    .logo-text {
      font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card {
      width: 100%; max-width: 420px;
      background: rgba(12, 18, 45, 0.85);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 36px 32px;
    }

    .card-title {
      font-size: 20px; font-weight: 800; color: var(--white);
      margin-bottom: 6px;
    }
    .card-subtitle {
      font-size: 14px; color: rgba(255,255,255,0.45);
      margin-bottom: 28px; line-height: 1.5;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,0.6); margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--white); font-size: 15px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .field input::placeholder { color: rgba(255,255,255,0.25); }
    .field input:focus { border-color: rgba(69,80,235,0.6); }

    .btn-primary {
      width: 100%; padding: 13px; border-radius: 10px; cursor: pointer;
      background: var(--grad); color: var(--white);
      font-size: 15px; font-weight: 700; font-family: inherit;
      border: none; margin-top: 6px; transition: filter 0.2s;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; filter: none; }

    .error-msg {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5; font-size: 13px; font-weight: 500;
      padding: 10px 14px; border-radius: 8px; margin-bottom: 16px;
      display: none;
    }
    .error-msg.show { display: block; }

    .success-card {
      width: 100%; max-width: 420px; text-align: center;
      background: rgba(12, 18, 45, 0.85);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 48px 32px;
      display: none;
    }
    .success-card.show { display: block; }
    .success-icon {
      width: 64px; height: 64px; margin: 0 auto 20px;
      background: var(--grad); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .success-icon svg { width: 28px; height: 28px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .success-card h2 { font-size: 20px; font-weight: 800; color: var(--white); margin-bottom: 8px; }
    .success-card p { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.6; }
    .back-link {
      display: inline-block; margin-top: 24px;
      color: rgba(168,85,247,0.9); font-size: 14px; font-weight: 600;
      text-decoration: none;
    }
    .back-link:hover { color: var(--purple-500); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }

    @media (max-width: 480px) {
      .card, .success-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<iframe class="globe-frame" src="/globe.html" title="Globe"></iframe>
<div class="overlay"></div>

<a href="/signup.html" class="back">
  <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  Back
</a>

<div class="page">
  <a href="/" class="logo">
    <img src="/logo.png" alt="Langscroll">
    <span class="logo-text">langscroll</span>
  </a>

  <div class="card" id="form-card">
    <div class="card-title">Forgot your password?</div>
    <div class="card-subtitle">Enter your email and we'll send you a link to reset it.</div>

    <div class="error-msg" id="error-msg"></div>

    <form onsubmit="handleSubmit(event)">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <button type="submit" class="btn-primary" id="btn-submit">Send Reset Link</button>
    </form>
  </div>

  <div class="success-card" id="success-card">
    <div class="success-icon">
      <svg viewBox="0 0 24 24">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
    </div>
    <h2>Check your inbox</h2>
    <p id="success-msg">We've sent a reset link to your email. It expires in 1 hour.</p>
    <a href="/signup.html" class="back-link">← Back</a>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://rvfkbodbhietyljndfwx.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_8DV9d8TXrOLmwc_7qoB-Zw_qPRbjTDs';
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function showError(msg) {
    var el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
  }

  function clearError() {
    document.getElementById('error-msg').classList.remove('show');
  }

  function setLoading(loading) {
    var btn = document.getElementById('btn-submit');
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span>Sending…' : 'Send Reset Link';
  }

  async function handleSubmit(e) {
    e.preventDefault();
    clearError();

    var email = document.getElementById('email').value.trim();
    setLoading(true);

    var { error } = await client.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://getlangscroll.com/auth/reset-password',
    });

    setLoading(false);

    if (error) {
      showError(error.message);
    } else {
      document.getElementById('form-card').style.display = 'none';
      document.getElementById('success-msg').textContent =
        'We\'ve sent a reset link to ' + email + '. It expires in 1 hour.';
      document.getElementById('success-card').classList.add('show');
    }
  }
</script>
</body>
</html>
